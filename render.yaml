services:
  - type: web
    name: ai-medical-diagnosis
    runtime: python
    region: oregon
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: cd app && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_URL
        sync: false
